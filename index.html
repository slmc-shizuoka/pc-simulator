<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Assembly Lab — 3D自作PC組み立てシミュレーター</title>
<style>
  :root {
    --bg: #0a0e14;
    --bg-grid: #0d1420;
    --panel: #111821;
    --panel-border: #1e2a3a;
    --ink: #e6edf3;
    --ink-dim: #8b9bb0;
    --ink-muted: #5a6b80;
    --accent: #5ee3ff;
    --accent-dim: #2d7a8c;
    --warning: #ffb454;
    --success: #7fd962;
    --danger: #ff6b6b;
    --cable-pwr: #ffb454;
    --cable-data: #5ee3ff;
    --cable-fan: #ff6b9d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== Layout ===== */
  #app {
    position: fixed; inset: 0;
    display: grid;
    grid-template-columns: 320px 1fr 360px;
    grid-template-rows: 56px 1fr 80px;
    grid-template-areas:
      "header header header"
      "sidebar canvas detail"
      "sidebar timeline detail";
    gap: 1px;
    background: var(--panel-border);
    z-index: 1;
  }

  /* ===== Header ===== */
  header {
    grid-area: header;
    background: var(--panel);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
  }
  .logo {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.05em;
    color: var(--ink);
  }
  .logo .brand {
    color: var(--accent);
    margin-right: 6px;
  }
  .breadcrumb {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .btn {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--ink-dim);
    padding: 6px 12px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .btn.primary:hover {
    background: #fff;
    border-color: #fff;
  }
  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ===== Sidebar (steps) ===== */
  aside.sidebar {
    grid-area: sidebar;
    background: var(--panel);
    overflow-y: auto;
    padding: 16px 0;
  }
  .sidebar-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 0 20px 12px;
    border-bottom: 1px solid var(--panel-border);
    margin-bottom: 12px;
  }
  .step {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    padding: 10px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.12s;
  }
  .step:hover { background: rgba(94, 227, 255, 0.04); }
  .step.current {
    background: rgba(94, 227, 255, 0.08);
    border-left-color: var(--accent);
  }
  .step.done {
    opacity: 0.55;
  }
  .step-num {
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
  }
  .step.current .step-num { color: var(--accent); }
  .step.done .step-num { color: var(--success); }
  .step-title {
    font-size: 13px;
    color: var(--ink);
  }
  .step-title small {
    display: block;
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .step-check {
    width: 14px;
    height: 14px;
    border: 1px solid var(--panel-border);
    border-radius: 2px;
    position: relative;
  }
  .step.done .step-check {
    background: var(--success);
    border-color: var(--success);
  }
  .step.done .step-check::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg);
    font-size: 10px;
    font-weight: 700;
  }

  /* ===== Canvas area ===== */
  #canvas-wrap {
    grid-area: canvas;
    position: relative;
    background: var(--bg);
    overflow: hidden;
  }
  #canvas-wrap canvas { display: block; }

  /* HUD on canvas */
  .hud {
    position: absolute;
    pointer-events: none;
    font-size: 11px;
    letter-spacing: 0.08em;
  }
  .hud-tl { top: 16px; left: 16px; }
  .hud-tr { top: 16px; right: 16px; text-align: right; }
  .hud-bl { bottom: 16px; left: 16px; }
  .hud-corner {
    color: var(--ink-muted);
    text-transform: uppercase;
  }
  .hud-corner strong {
    color: var(--accent);
    font-weight: 500;
  }
  .hud .crosshair {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1px solid var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
  }
  .hud .crosshair::before,
  .hud .crosshair::after {
    content: '';
    position: absolute;
    background: var(--accent);
  }
  .hud .crosshair::before {
    left: -3px; right: -3px; top: 50%; height: 1px;
  }
  .hud .crosshair::after {
    top: -3px; bottom: -3px; left: 50%; width: 1px;
  }

  .step-banner {
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-50%);
    background: rgba(17, 24, 33, 0.92);
    border: 1px solid var(--accent-dim);
    padding: 10px 20px;
    min-width: 420px;
    text-align: center;
    backdrop-filter: blur(8px);
    pointer-events: none;
  }
  .step-banner .tag {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .step-banner .title {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }

  /* ===== Timeline ===== */
  #timeline {
    grid-area: timeline;
    background: var(--panel);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  .tl-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--ink-dim);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tl-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .tl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .tl-track {
    flex: 1;
    height: 4px;
    background: var(--bg-grid);
    position: relative;
    border: 1px solid var(--panel-border);
  }
  .tl-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .tl-ticks {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: space-between;
  }
  .tl-tick {
    width: 2px;
    height: 100%;
    background: var(--panel-border);
  }
  .tl-label {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
    font-variant-numeric: tabular-nums;
  }
  .tl-label strong {
    color: var(--accent);
    font-weight: 500;
  }

  /* ===== Detail panel ===== */
  #detail {
    grid-area: detail;
    background: var(--panel);
    overflow-y: auto;
    padding: 20px;
  }
  .detail-header {
    border-bottom: 1px solid var(--panel-border);
    padding-bottom: 14px;
    margin-bottom: 16px;
  }
  .detail-tag {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .detail-title {
    font-size: 18px;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .detail-sub {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }
  .detail-section {
    margin-bottom: 20px;
  }
  .detail-section h3 {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--ink-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--panel-border);
  }
  .detail-section p {
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.7;
  }
  .checklist {
    list-style: none;
  }
  .checklist li {
    padding: 6px 0 6px 20px;
    position: relative;
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.6;
  }
  .checklist li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
  }
  .warn {
    background: rgba(255, 180, 84, 0.08);
    border-left: 2px solid var(--warning);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--ink-dim);
    line-height: 1.6;
  }
  .warn strong {
    color: var(--warning);
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .spec-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 12px;
    font-size: 11px;
  }
  .spec-grid dt {
    color: var(--ink-muted);
    letter-spacing: 0.05em;
  }
  .spec-grid dd {
    color: var(--ink);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ===== Controls legend ===== */
  .legend {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: rgba(17, 24, 33, 0.85);
    border: 1px solid var(--panel-border);
    padding: 10px 12px;
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    backdrop-filter: blur(8px);
    pointer-events: none;
  }
  .legend div { margin: 2px 0; }
  .legend kbd {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--panel-border);
    padding: 1px 5px;
    margin-right: 6px;
    color: var(--ink);
    font-family: inherit;
    font-size: 9px;
  }

  /* ===== View toggles ===== */
  .view-toggles {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1px;
    background: var(--panel-border);
    margin-top: 60px;
  }
  .view-toggles button {
    background: rgba(17, 24, 33, 0.9);
    border: none;
    color: var(--ink-dim);
    padding: 6px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(8px);
  }
  .view-toggles button.active {
    background: var(--accent);
    color: var(--bg);
  }

  /* ===== Completion overlay ===== */
  .complete-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 14, 20, 0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    backdrop-filter: blur(4px);
  }
  .complete-overlay.visible { display: flex; }
  .complete-card {
    border: 1px solid var(--accent);
    background: var(--panel);
    padding: 40px 60px;
    text-align: center;
    position: relative;
  }
  .complete-card::before,
  .complete-card::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border: 1px solid var(--accent);
  }
  .complete-card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .complete-card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .complete-card h2 {
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.4em;
    margin-bottom: 8px;
  }
  .complete-card p {
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--panel-border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

  @media (max-width: 1100px) {
    #app { grid-template-columns: 260px 1fr 280px; }
    .step-banner { min-width: 320px; }
  }
</style>
</head>

<div id="app">
  <!-- HEADER -->
  <header>

    </div>
  </div>

  <!-- DETAIL -->
  <aside id="detail"></aside>

  <!-- TIMELINE -->
  <div id="timeline">

      <div class="tl-ticks" id="tl-ticks"></div>
    </div>
    <button class="tl-btn" id="tl-next">▶</button>
  </div>
</div>

// ── ケースはATX想定で、以下のサイズ感にスケール。
const SIZE = {
  case: { w: 8, h: 18, d: 16 },       // ケース内寸イメージ
  mb:   { w: 10, h: 0.3, d: 11 },     // マザー（床に寝かせて配置）
};

function createCase() {
  const g = new THREE.Group();
  const { w, h, d } = SIZE.case;

  // 底
  const base = new THREE.Mesh(new THREE.BoxGeometry(w, 0.3, d), MAT.case);
  base.position.y = -h / 2 + 0.15;
  base.receiveShadow = true;
  g.add(base);

  // 背面
  const back = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.3), MAT.case);
  back.position.z = -d / 2 + 0.15;
  back.castShadow = true; back.receiveShadow = true;
  g.add(back);

  // 天面
  const top = new THREE.Mesh(new THREE.BoxGeometry(w, 0.3, d), MAT.case);
  top.position.y = h / 2 - 0.15;
  top.receiveShadow = true;
  g.add(top);

  // 前面（一部メッシュ風の穴あき表現）
  const front = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.2), MAT.case);
  front.position.z = d / 2 - 0.1;
  front.castShadow = true;
  g.add(front);

  // 左サイド（ガラスパネル風・半透明）
  const glassMat = new THREE.MeshPhysicalMaterial({
    color: 0x0a1018, transparent: true, opacity: 0.15,
    metalness: 0, roughness: 0.1, transmission: 0.8
  });
  const leftSide = new THREE.Mesh(new THREE.BoxGeometry(0.1, h - 0.6, d - 0.6), glassMat);
  leftSide.position.x = -w / 2 + 0.05;
  g.add(leftSide);

  // エッジライン（青のネオン）
  const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d));
  const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x5ee3ff, transparent: true, opacity: 0.6 }));
  g.add(line);

  g.userData = { name: 'PCケース' };
  return g;
}

function createStandoffs() {
  const g = new THREE.Group();
  // MBと同サイズの9点グリッドに配置（簡略化）
  const mbW = SIZE.mb.w, mbD = SIZE.mb.d;
  const positions = [
    [-mbW/2+0.5, -mbD/2+0.5], [0, -mbD/2+0.5], [mbW/2-0.5, -mbD/2+0.5],
    [-mbW/2+0.5, 0],          [0, 0],          [mbW/2-0.5, 0],
    [-mbW/2+0.5, mbD/2-0.5],  [0, mbD/2-0.5],  [mbW/2-0.5, mbD/2-0.5],
  ];
  positions.forEach(([x, z]) => {
    const so = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.6, 6), MAT.standoff);
    so.position.set(x, 0.3, z);
    so.castShadow = true;
    g.add(so);
  });
  g.userData = { name: 'スタンドオフ' };
  return g;
}

function createMotherboard() {
  const g = new THREE.Group();
  const { w, h, d } = SIZE.mb;

  const base = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), MAT.mb);
  base.castShadow = true; base.receiveShadow = true;
  g.add(base);

  // チップセットヒートシンク
  const chipset = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.3, 1.8), MAT.heatsink);
  chipset.position.set(1.5, 0.3, 2);
  chipset.castShadow = true;
  g.add(chipset);

  // VRMヒートシンク
  const vrm = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 3), MAT.heatsink);
  vrm.position.set(-3, 0.3, -2);
  vrm.castShadow = true;
  g.add(vrm);

  // CPUソケット（窪み）
  const socket = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 2), MAT.cpuBottom);
  socket.position.set(-1, 0.2, -2);
  g.add(socket);

  // メモリスロット（4本）
  for (let i = 0; i < 4; i++) {
    const slot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 4), MAT.cpuBottom);
    slot.position.set(2.5 + i * 0.4, 0.3, -2);
    g.add(slot);
  }

  // PCIeスロット
  const pcie1 = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 0.3), MAT.cpuBottom);
  pcie1.position.set(-1, 0.25, 3);
  g.add(pcie1);
  const pcie2 = new THREE.Mesh(new THREE.BoxGeometry(4, 0.2, 0.3), MAT.cpuBottom);
  pcie2.position.set(-1.5, 0.25, 4);
  g.add(pcie2);

  // M.2スロット
  const m2slot = new THREE.Mesh(new THREE.BoxGeometry(3, 0.05, 0.5), MAT.cpuBottom);
  m2slot.position.set(1, 0.18, 0);
  g.add(m2slot);

  // I/Oパネル
  const io = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.5, 4), MAT.heatsink);
  io.position.set(-w/2 - 0.1, 0.9, -d/2 + 2.5);
  g.add(io);

  g.userData = { name: 'マザーボード' };
  return g;
}

function createCPU() {

  g.add(tri);

function createCooler() {
  const g = new THREE.Group();
  // ベース
  const base = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, 2.2), MAT.cpu);
  base.position.y = 0.1;
  g.add(base);
  // ヒートパイプ
  for (let i = 0; i < 4; i++) {
    const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 3, 8), MAT.cpu);
    pipe.position.set(-0.6 + i * 0.4, 1.5, 0);
    g.add(pipe);
  }
  // フィン（ヒートシンク本体）
  const fins = new THREE.Mesh(new THREE.BoxGeometry(2.4, 2.6, 1.2), MAT.heatsink);
  fins.position.y = 2.3;
  fins.castShadow = true;
  g.add(fins);
  // フィンのライン
  for (let i = 0; i < 10; i++) {
    const line = new THREE.Mesh(new THREE.BoxGeometry(2.41, 0.04, 1.21), MAT.cpuBottom);
    line.position.y = 1.1 + i * 0.26;
    g.add(line);
  }
  // ファン
  const fan = createFan(1.4, 0x2a3242);
  fan.position.set(0, 2.3, 0.9);
  fan.rotation.x = Math.PI / 2;
  g.add(fan);
  g.userData = { name: 'CPUクーラー' };
  return g;
}

function createFan(radius, color) {
  const g = new THREE.Group();
  const frame = new THREE.Mesh(
    new THREE.BoxGeometry(radius * 2, 0.4, radius * 2),
    MAT.fan
  );
  g.add(frame);
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.3, radius * 0.3, 0.3, 16), MAT.fan);
  hub.rotation.x = Math.PI / 2;
  g.add(hub);
  // 7枚羽
  const bladeMat = new THREE.MeshStandardMaterial({ color: color || 0x2a3242, metalness: 0.3, roughness: 0.6, transparent: true, opacity: 0.85 });
  const blades = new THREE.Group();
  for (let i = 0; i < 7; i++) {
    const blade = new THREE.Mesh(new THREE.BoxGeometry(radius * 0.75, 0.15, 0.3), bladeMat);
    blade.position.set(radius * 0.5, 0, 0);
    blade.rotation.y = 0.3;
    const wrap = new THREE.Group();
    wrap.add(blade);
    wrap.rotation.y = (i / 7) * Math.PI * 2;
    blades.add(wrap);
  }
  blades.rotation.x = Math.PI / 2;
  g.add(blades);
  g.userData = { blades, name: 'ファン' };
  return g;
}

function createRAM() {
  const g = new THREE.Group();
  const pcb = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 0.2), MAT.ram);
  g.add(pcb);

}

  const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.85 });
  const mesh = new THREE.Mesh(geom, mat);
  return mesh;
}

  const geo = new THREE.BoxGeometry(size.x * 1.15, size.y * 1.15, size.z * 1.15);

// ORBIT CONTROLS (自作の簡易版 / OrbitControls外部ロード不要)
// ============================================================
class SimpleOrbit {
  constructor(cam, dom) {
    this.cam = cam;
    this.dom = dom;
    this.target = new THREE.Vector3(0, -1, 0);
    this.radius = cam.position.distanceTo(this.target);
    this.theta = Math.atan2(cam.position.x - this.target.x, cam.position.z - this.target.z);
    this.phi = Math.acos((cam.position.y - this.target.y) / this.radius);
    this.dragging = false;
    this.panning = false;
    this.lx = 0; this.ly = 0;
    this.enabled = true;
    this.minR = 8; this.maxR = 60;
    this._bind();
    this.update();
  }
  _bind() {
    this.dom.addEventListener('mousedown', e => {
      this.dragging = e.button === 0;
      this.panning = e.button === 2;
      this.lx = e.clientX; this.ly = e.clientY;
      e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
      if (!this.enabled) return;
      if (!this.dragging && !this.panning) return;
      const dx = e.clientX - this.lx, dy = e.clientY - this.ly;
      this.lx = e.clientX; this.ly = e.clientY;
      if (this.dragging) {
        this.theta -= dx * 0.008;
        this.phi = Math.max(0.15, Math.min(Math.PI - 0.15, this.phi - dy * 0.008));
      } else if (this.panning) {
        const panScale = this.radius * 0.001;
        const offset = new THREE.Vector3();
        // カメラ右方向＆上方向に平行移動
        const right = new THREE.Vector3();
        this.cam.getWorldDirection(offset);
        right.crossVectors(offset, this.cam.up).normalize();
        this.target.addScaledVector(right, -dx * panScale);
        this.target.y += dy * panScale;
      }
      this.update();
    });
    window.addEventListener('mouseup', () => {
      this.dragging = false; this.panning = false;
    });
    this.dom.addEventListener('wheel', e => {
      if (!this.enabled) return;
      this.radius = Math.max(this.minR, Math.min(this.maxR, this.radius + e.deltaY * 0.015));
      this.update();
      e.preventDefault();
    }, { passive: false });
    this.dom.addEventListener('contextmenu', e => e.preventDefault());
  }
  setView(name) {
    const r = 26;
    const map = {
      iso:   { t: Math.PI/5, p: Math.PI/3 },
      front: { t: 0, p: Math.PI/2 },
      side:  { t: Math.PI/2, p: Math.PI/2 },
      top:   { t: 0, p: 0.2 },
    };
    if (!map[name]) return;
    this.theta = map[name].t;
    this.phi = map[name].p;
    this.radius = r;
    this.target.set(0, -1, 0);
    this.update();
  }
  update() {
    const s = Math.sin(this.phi);
    this.cam.position.x = this.target.x + this.radius * s * Math.sin(this.theta);
    this.cam.position.y = this.target.y + this.radius * Math.cos(this.phi);
    this.cam.position.z = this.target.z + this.radius * s * Math.cos(this.theta);
    this.cam.lookAt(this.target);
  }
}

const state = {

};

// ステップIDとパーツキーの対応
const STEP_PART_KEYS = {
  case: 'case', standoff: 'standoff', mb: 'mb', cpu: 'cpu',
  cooler: 'cooler', ram1: 'ram1', ram2: 'ram2', m2: 'm2',
  gpu: 'gpu', psu: 'psu', hdd: 'hdd',
  fan_front: 'fan_front', fan_rear: 'fan_rear',
  cables_power: '__cables_power__', cables_data: '__cables_data__',
};

// ステップまで進める（追加）or 戻す（削除）
function setStep(targetIdx) {
  targetIdx = Math.max(-1, Math.min(STEPS.length - 1, targetIdx));

  // 可視状態を再計算: 0..targetIdx までのパーツを表示、それ以外を非表示
  STEPS.forEach((step, i) => {
    const key = STEP_PART_KEYS[step.id];
    const shouldShow = i <= targetIdx;
    if (key === '__cables_power__') {
      cablesPower.visible = shouldShow;
    } else if (key === '__cables_data__') {
      cablesData.visible = shouldShow;
    } else if (parts[key]) {
      parts[key].visible = shouldShow;
    }
  });

  state.currentStep = targetIdx;
  updateUI();

  // 現在ステップのパーツをハイライト
  if (targetIdx >= 0) {
    const key = STEP_PART_KEYS[STEPS[targetIdx].id];
    if (key && !key.startsWith('__') && parts[key]) {
      setHighlight(key);
    } else {
      setHighlight(null);
    }
    showLabels(STEPS[targetIdx].id);

    // パーツの「落ちてくる」アニメ
    animateInStep(targetIdx);
  } else {
    setHighlight(null);
    clearLabels();
  }

  // 完了判定
  if (targetIdx === STEPS.length - 1) {
    setTimeout(() => {
      document.getElementById('complete').classList.add('visible');
    }, 800);
  } else {
    document.getElementById('complete').classList.remove('visible');
  }
}

// パーツ追加時の落下アニメーション
function animateInStep(idx) {
  const step = STEPS[idx];
  const key = STEP_PART_KEYS[step.id];
  if (!key || key.startsWith('__')) return;
  const p = parts[key];
  if (!p) return;

  const target = POS[key];
  if (!target) return;
  const [tx, ty, tz] = target.pos;
  const startY = ty + 8;
  p.position.y = startY;
  const startTime = performance.now();
  const dur = 600;
  function step2(t) {
    const k = Math.min(1, (t - startTime) / dur);
    const e = 1 - Math.pow(1 - k, 3);
    p.position.y = startY + (ty - startY) * e;
    if (k < 1) requestAnimationFrame(step2);
    else p.position.y = ty;
  }
  requestAnimationFrame(step2);
}

// ============================================================
// EXPLODED VIEW (分解表示)
// ============================================================
function toggleExploded() {
  state.exploded = !state.exploded;
  document.getElementById('btn-explode').textContent = state.exploded ? '⊞ 元に戻す' : '⊞ 分解表示';
  const factor = state.exploded ? 2.2 : 1.0;
  Object.keys(parts).forEach(key => {
    const p = parts[key];
    const cfg = POS[key];
    if (!cfg) return;
    const [x, y, z] = cfg.pos;
    const tx = x * factor;
    const ty = y + (state.exploded ? (y - (-3)) * 0.5 : 0);
    const tz = z * factor;
    animateTo(p, tx, ty, tz, 500);
  });
  if (state.exploded) {
    cablesGroup.visible = false;
  } else {
    cablesGroup.visible = true;
  }
}
function animateTo(obj, tx, ty, tz, dur) {
  const sx = obj.position.x, sy = obj.position.y, sz = obj.position.z;
  const t0 = performance.now();
  function loop(t) {
    const k = Math.min(1, (t - t0) / dur);
    const e = 1 - Math.pow(1 - k, 3);
    obj.position.x = sx + (tx - sx) * e;
    obj.position.y = sy + (ty - sy) * e;
    obj.position.z = sz + (tz - sz) * e;
    if (k < 1) requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

  if (e.key === 'ArrowRight') setStep(state.currentStep + 1);
  if (e.key === 'ArrowLeft') setStep(state.currentStep - 1);
  if (e.key === 'r' || e.key === 'R') setStep(-1);
});

// Resize
function onResize() {
  const w = canvasWrap.clientWidth, h = canvasWrap.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);

// ============================================================
// ANIMATION LOOP
// ============================================================
function animate() {
  requestAnimationFrame(animate);

  // ファン回転
  Object.values(parts).forEach(p => {
    if (p.userData && p.userData.blades) {
      p.userData.blades.rotation.y += 0.08;
    }
  });
  // CPUクーラーのファン（子グループ内）
  if (parts.cooler && parts.cooler.visible) {
    parts.cooler.traverse(obj => {
      if (obj.userData && obj.userData.blades) {
        obj.userData.blades.rotation.y += 0.1;
      }
    });
  }
  // GPUファン回転
  if (parts.gpu && parts.gpu.visible) {
    parts.gpu.children.forEach(c => {
      if (c.geometry && c.geometry.type === 'CylinderGeometry' && c.material === MAT.fan) {
        c.rotation.y += 0.12;
      }
    });
  }

  // ハイライトのパルス
  if (currentHighlight) {
    currentHighlight.userData.pulse += 0.05;
    const s = 1 + Math.sin(currentHighlight.userData.pulse) * 0.03;
    currentHighlight.scale.set(s, s, s);
    currentHighlight.material.opacity = 0.6 + Math.sin(currentHighlight.userData.pulse) * 0.3;
  }

  // ラベル位置更新
  updateLabels();

  // ズーム表示
  document.getElementById('hud-zoom').textContent =
    (26 / orbit.radius).toFixed(1) + 'x';

  renderer.render(scene, camera);
}

// ============================================================
// INIT
// ============================================================
updateUI();
animate();

// 起動時にちょっとだけカメラ動かして3Dとわかるように
let introT = 0;
const introInterval = setInterval(() => {
  orbit.theta += 0.002;
  orbit.update();
  introT++;
  if (introT > 100) clearInterval(introInterval);
}, 16);

</script>
